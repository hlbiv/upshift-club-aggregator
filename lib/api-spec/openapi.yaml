      description: >
        One scrape_health row whose last_scraped_at is older than
        `thresholdDays` or NULL. `entityName` is a best-effort join label.
      properties:
        entityType:
          type: string
        entityId:
          type: integer
        entityName:
          type: string
          nullable: true
        lastScrapedAt:
          type: string
          format: date-time
          nullable: true
        lastStatus:
          type: string
          nullable: true
        consecutiveFailures:
          type: integer
      required:
        - entityType
        - entityId
        - entityName
        - lastScrapedAt
        - lastStatus
        - consecutiveFailures

    StaleScrapesResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/StaleScrapesRow"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        thresholdDays:
          type: integer
      required:
        - rows
        - total
        - page
        - pageSize
        - thresholdDays

    CoachMissesRow:
      type: object
      description: One college whose head coach the scraper failed to extract.
      properties:
        collegeId:
          type: integer
        collegeName:
          type: string
        division:
          type: string
        genderProgram:
          type: string
        rosterUrl:
          type: string
          nullable: true
        probedUrls:
          type: array
          items:
            type: string
        scrapeRunLogId:
          type: integer
          nullable: true
        recordedAt:
          type: string
          format: date-time
      required:
        - collegeId
        - collegeName
        - division
        - genderProgram
        - rosterUrl
        - probedUrls
        - scrapeRunLogId
        - recordedAt

    CoachMissesResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/CoachMissesRow"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - rows
        - total
        - page
        - pageSize

    CollegeRosterQualityFlagItem:
      type: object
      properties:
        id:
          type: integer
        collegeId:
          type: integer
        collegeName:
          type: string
        academicYear:
          type: string
        flagType:
          type: string
          enum: [historical_no_data, partial_parse, url_needs_review]
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        resolvedByEmail:
          type: string
          nullable: true
        resolutionNote:
          type: string
          nullable: true
      required:
        - id
        - collegeId
        - collegeName
        - academicYear
        - flagType
        - metadata
        - createdAt
        - resolvedAt
        - resolvedByEmail
        - resolutionNote

    CollegeRosterQualityFlagsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CollegeRosterQualityFlagItem"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - items
        - total
        - page
        - pageSize

    ResolveCollegeRosterQualityFlagWithUrlRequest:
      type: object
      properties:
        new_soccer_program_url:
          type: string
          format: uri
          description: The corrected soccer program URL to write to colleges.soccer_program_url.
      required:
        - new_soccer_program_url

    ResolveCollegeRosterQualityFlagWithUrlResponse:
      type: object
      properties:
        success:
          type: boolean
        college_id:
          type: integer
        new_soccer_program_url:
          type: string
      required:
        - success
        - college_id
        - new_soccer_program_url

    ScrapedCountsDelta:
      type: object
      description: Records added across the five headline ingest tables since a point in time.
      properties:
        since:
          type: string
          format: date-time
        clubsAdded:
          type: integer
        coachesAdded:
          type: integer
        eventsAdded:
          type: integer
        rosterSnapshotsAdded:
          type: integer
        matchesAdded:
          type: integer
      required:
        - since
        - clubsAdded
        - coachesAdded
        - eventsAdded
        - rosterSnapshotsAdded
        - matchesAdded

    CoverageTrendPoint:
      type: object
      description: One day of scrape-run telemetry aggregated from scrape_run_logs.
      properties:
        date:
          type: string
        runs:
          type: integer
        successes:
          type: integer
        failures:
          type: integer
        rowsTouched:
          type: integer
      required:
        - date
        - runs
        - successes
        - failures
        - rowsTouched

    CoverageTrendResponse:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/CoverageTrendPoint"
        windowDays:
          type: integer
      required:
        - points
        - windowDays

    SchedulerJob:
      type: object
      description: One row of `scheduler_jobs` — an admin-triggered scraper invocation.
      properties:
        id:
          type: integer
        jobKey:
          type: string
        args:
          type: object
          additionalProperties: true
          nullable: true
        status:
          type: string
          enum: [pending, running, success, failed, canceled]
        requestedBy:
          type: integer
          nullable: true
        requestedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        exitCode:
          type: integer
          nullable: true
        stdoutTail:
          type: string
          nullable: true
        stderrTail:
          type: string
          nullable: true
      required:
        - id
        - jobKey
        - args
        - status
        - requestedBy
        - requestedAt
        - startedAt
        - completedAt
        - exitCode
        - stdoutTail
        - stderrTail

    SchedulerJobList:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/SchedulerJob"
        total:
          type: integer
      required:
        - jobs
        - total

    ScraperSchedule:
      type: object
      description: >
        One known scraper schedule — metadata + recent `scheduler_jobs` rows.
      properties:
        jobKey:
          type: string
        description:
          type: string
        cronExpression:
          type: string
          nullable: true
          description: >
            Curated display string (e.g. "0 3 * * *") or null when the job
            runs only via admin-triggered "Run now".
        recentRuns:
          type: array
          items:
            $ref: "#/components/schemas/SchedulerJob"
      required:
        - jobKey
        - description
        - cronExpression
        - recentRuns

    ScraperSchedulesResponse:
      type: object
      properties:
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/ScraperSchedule"
      required:
        - schedules

    RunNowRequest:
      type: object
      description: >
        Enqueue a one-off run. `jobKey` is taken from the URL path — when
        present in the body it must match. `args` are forwarded as CLI flags
        by the worker (`{"event-id": 123}` → `["--event-id", "123"]`).
      properties:
        jobKey:
          type: string
          minLength: 1
        args:
          type: object
          additionalProperties: true

    RunNowResponse:
      type: object
      properties:
        id:
          type: integer
        jobKey:
          type: string
        status:
          type: string
          enum: [pending]
        requestedAt:
          type: string
          format: date-time
      required:
        - id
        - jobKey
        - status
        - requestedAt

    CoverageLeagueRow:
      type: object
      description: >
        Per-league aggregate coverage stats. A club belongs to a league via
        `club_affiliations.league_id = leagues_master.id` — joined on a
        stable id rather than a name string, so a
        `leagues_master.league_name` rename cannot drop the league.
      properties:
        leagueId:
          type: integer
        leagueName:
          type: string
        clubsTotal:
          type: integer
          description: Distinct clubs affiliated with this league.
        clubsWithRosterSnapshot:
          type: integer
          description: Clubs with at least one row in `club_roster_snapshots`.
        clubsWithCoachDiscovery:
          type: integer
          description: Clubs with at least one row in `coach_discoveries`.
        clubsNeverScraped:
          type: integer
          description: Clubs whose `scrape_health.last_scraped_at` is NULL / missing.
        clubsStale14d:
          type: integer
          description: Clubs whose `scrape_health.last_scraped_at` is older than 14 days.
      required:
        - leagueId
        - leagueName
        - clubsTotal
        - clubsWithRosterSnapshot
        - clubsWithCoachDiscovery
        - clubsNeverScraped
        - clubsStale14d

    CoverageLeaguesResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/CoverageLeagueRow"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - rows
        - total
        - page
        - pageSize

    CoverageLeaguesSummaryResponse:
      type: object
      description: >
        Aggregate coverage rollup across every league. Used by the
        Coverage page's KpiStrip. Counts are deduplicated by canonical
        club so a club affiliated with N leagues counts once.
      properties:
        leaguesTotal:
          type: integer
        clubsTotal:
          type: integer
        clubsWithRosterSnapshot:
          type: integer
        clubsWithCoachDiscovery:
          type: integer
        clubsNeverScraped:
          type: integer
        clubsStale14d:
          type: integer
      required:
        - leaguesTotal
        - clubsTotal
        - clubsWithRosterSnapshot
        - clubsWithCoachDiscovery
        - clubsNeverScraped
        - clubsStale14d

    CoverageHistoryRow:
      type: object
      description: >
        One day's snapshot of the global coverage rollup. Same six counters
        as CoverageLeaguesSummaryResponse so the trend series is drop-in
        comparable to the live current snapshot.
      properties:
        snapshotDate:
          type: string
          description: ISO date (YYYY-MM-DD) of the snapshot.
        leaguesTotal:
          type: integer
        clubsTotal:
          type: integer
        clubsWithRosterSnapshot:
          type: integer
        clubsWithCoachDiscovery:
          type: integer
        clubsNeverScraped:
          type: integer
        clubsStale14d:
          type: integer
      required:
        - snapshotDate
        - leaguesTotal
        - clubsTotal
        - clubsWithRosterSnapshot
        - clubsWithCoachDiscovery
        - clubsNeverScraped
        - clubsStale14d

    CoverageLeaguesHistoryResponse:
      type: object
      description: >
        Daily snapshot timeseries, oldest-first. May contain fewer than
        the requested `days` rows on a fresh deploy.
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/CoverageHistoryRow"
      required:
        - rows

    CoverageLeagueHistoryRow:
      type: object
      description: >
        One day's snapshot of a single league's coverage rollup. Mirrors
        the five per-league counters returned by the `/leagues` rollup
        (no `leaguesTotal` — that's a global field, not per-league).
      properties:
        snapshotDate:
          type: string
          description: ISO date (YYYY-MM-DD) of the snapshot.
        clubsTotal:
          type: integer
        clubsWithRosterSnapshot:
          type: integer
        clubsWithCoachDiscovery:
          type: integer
        clubsNeverScraped:
          type: integer
        clubsStale14d:
          type: integer
      required:
        - snapshotDate
        - clubsTotal
        - clubsWithRosterSnapshot
        - clubsWithCoachDiscovery
        - clubsNeverScraped
        - clubsStale14d

    CoverageLeagueHistoryResponse:
      type: object
      description: >
        Daily snapshot timeseries for a single league, oldest-first. The
        `league` field echoes the resolved (id, name) pair so the page
        can render a header without a second request. May contain fewer
        than the requested `days` rows on a fresh deploy.
      properties:
        league:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
          required:
            - id
            - name
        rows:
          type: array
          items:
            $ref: "#/components/schemas/CoverageLeagueHistoryRow"
      required:
        - league
        - rows

    CoverageLeagueDetailRow:
      type: object
      description: Per-club coverage detail within a single league.
      properties:
        clubId:
          type: integer
        clubNameCanonical:
          type: string
        lastScrapedAt:
          type: string
          format: date-time
          nullable: true
        consecutiveFailures:
          type: integer
        coachCount:
          type: integer
        hasRosterSnapshot:
          type: boolean
        staffPageUrl:
          type: string
          nullable: true
        scrapeConfidence:
          type: number
          nullable: true
      required:
        - clubId
        - clubNameCanonical
        - lastScrapedAt
        - consecutiveFailures
        - coachCount
        - hasRosterSnapshot
        - staffPageUrl
        - scrapeConfidence

    CoverageLeagueDetailResponse:
      type: object
      properties:
        league:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
          required:
            - id
            - name
        rows:
          type: array
          items:
            $ref: "#/components/schemas/CoverageLeagueDetailRow"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - league
        - rows
        - total
        - page
        - pageSize

    ProAcademyAffiliation:
      type: object
      description: >
        One tier-1 academy-family affiliation row contributing to the
        `families` set on a ProAcademyRow. `genderProgram` is included so
        operators can spot mixed-gender pro pipelines (e.g. boys MLS NEXT +
        girls NWSL Academy on a co-ed club).
      properties:
        leagueId:
          type: integer
          nullable: true
        leagueName:
          type: string
        leagueFamily:
          type: string
        genderProgram:
          type: string
          nullable: true
      required:
        - leagueId
        - leagueName
        - leagueFamily
        - genderProgram

    ProAcademyRow:
      type: object
      description: >
        One canonical_clubs row that has at least one tier-1 academy-family
        affiliation, surfaced with the current `is_pro_academy` flag, the
        rolled-up `competitive_tier`, and the deduplicated set of academy
        families the club plays in. `affiliationCount` is the number of
        distinct tier-1 academy-family affiliations behind the row — useful
        for spot-checking clubs with unusually broad pipelines.
      properties:
        clubId:
          type: integer
        clubNameCanonical:
          type: string
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        isProAcademy:
          type: boolean
        competitiveTier:
          type: string
          enum: [recreational, recreational_plus, competitive, elite, academy]
        families:
          type: array
          items:
            type: string
        affiliations:
          type: array
          items:
            $ref: "#/components/schemas/ProAcademyAffiliation"
        affiliationCount:
          type: integer
      required:
        - clubId
        - clubNameCanonical
        - city
        - state
        - isProAcademy
        - competitiveTier
        - families
        - affiliations
        - affiliationCount

    ProAcademiesResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ProAcademyRow"
        total:
          type: integer
        flaggedTotal:
          type: integer
          description: >
            Total number of `canonical_clubs` rows where
            `is_pro_academy = TRUE`, irrespective of the current `flag`
            filter. Lets the dashboard render a "X of Y flagged" header
            without a second request.
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - rows
        - total
        - flaggedTotal
        - page
        - pageSize

    UpdateProAcademyRequest:
      type: object
      description: >
        Body for PATCH /v1/admin/pro-academies/{clubId}. Setting
        `isProAcademy` to its current value is allowed and still re-runs
        the per-club tier rollup (idempotent + force-recompute escape
        hatch).
      properties:
        isProAcademy:
          type: boolean
      required:
        - isProAcademy

    UpdateProAcademyResponse:
      type: object
      description: >
        Echoes the post-update flag + tier so the dashboard can patch its
        row without re-fetching the list. `previousCompetitiveTier` is the
        value the row had before the rollup re-ran — surfaces visible
        downgrade/upgrade transitions in the toast.
      properties:
        clubId:
          type: integer
        isProAcademy:
          type: boolean
        competitiveTier:
          type: string
          enum: [recreational, recreational_plus, competitive, elite, academy]
        previousCompetitiveTier:
          type: string
          enum: [recreational, recreational_plus, competitive, elite, academy]
      required:
        - clubId
        - isProAcademy
        - competitiveTier
        - previousCompetitiveTier
