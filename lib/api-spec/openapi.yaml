openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Upshift Club Aggregator API — youth soccer club graph database
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clubs
    description: Canonical club operations
  - name: leagues
    description: League directory operations
  - name: search
    description: Fuzzy search operations
  - name: analytics
    description: Duplicate detection, coverage gaps, and league overlap analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clubs:
    get:
      operationId: listClubs
      tags: [clubs]
      summary: List canonical clubs
      description: >
        Returns a paginated list of canonical clubs. Optionally filter by
        state (exact, case-insensitive), tier (integer 1–4), and gender_program.
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: Filter by US state abbreviation or full name (ILIKE match)
        - name: tier
          in: query
          schema:
            type: integer
          description: Filter by competitive tier (1=National Elite … 4=State)
        - name: gender_program
          in: query
          schema:
            type: string
          description: "Filter by gender program (e.g. boys, girls, boys_and_girls)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated club list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubListResponse"

  /clubs/{id}:
    get:
      operationId: getClub
      tags: [clubs]
      summary: Get a single club with aliases and affiliations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Club detail with aliases and league affiliations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDetailResponse"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clubs/{id}/related:
    get:
      operationId: getRelatedClubs
      tags: [clubs]
      summary: Graph traversal — clubs sharing a league affiliation
      description: >
        Returns clubs that share at least one league affiliation with the given
        club (one-hop neighbourhood in the club-league bipartite graph).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related clubs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubRelatedResponse"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /search:
    get:
      operationId: searchClubs
      tags: [search]
      summary: Fuzzy club name search
      description: >
        Returns ranked clubs whose canonical name or any known alias matches
        the query string (ILIKE). Results are ordered: prefix matches first,
        then substring matches.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /leagues:
    get:
      operationId: listLeagues
      tags: [leagues]
      summary: List all leagues in the master directory
      responses:
        "200":
          description: Full league inventory ordered by tier then name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueListResponse"

  /leagues/{id}/clubs:
    get:
      operationId: getLeagueClubs
      tags: [leagues]
      summary: Clubs affiliated with a league
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Clubs in the league
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueClubsResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clubs/search:
    get:
      operationId: searchClubsAdvanced
      tags: [clubs]
      summary: Advanced club search with combinable filters
      description: >
        Search clubs by name keyword, state, league affiliation, and/or website
        presence. All filters are combinable. Returns paginated results ordered
        alphabetically by canonical name.
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Substring match on club_name_canonical (ILIKE)
        - name: state
          in: query
          schema:
            type: string
          description: US state abbreviation or full name (ILIKE match)
        - name: league
          in: query
          schema:
            type: string
          description: League name substring to filter by affiliation (ILIKE)
        - name: has_website
          in: query
          schema:
            type: boolean
          description: When true, only clubs with a known website are returned
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated advanced club search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubSearchResponse"

  /events/search:
    get:
      operationId: searchEvents
      tags: [search]
      summary: Search league events by club, league, season, and source
      parameters:
        - name: club_id
          in: query
          schema:
            type: integer
          description: Filter events by canonical club ID
        - name: league
          in: query
          schema:
            type: string
          description: League name substring (ILIKE)
        - name: age_group
          in: query
          schema:
            type: string
          description: Age group (e.g. U14, U15)
        - name: gender
          in: query
          schema:
            type: string
          description: Gender filter (boys, girls)
        - name: season
          in: query
          schema:
            type: string
          description: Season identifier (e.g. 2024-2025)
        - name: source
          in: query
          schema:
            type: string
          description: Source URL substring (ILIKE)
        - name: start_date_from
          in: query
          schema:
            type: string
            format: date
          description: "Filter events with start_date >= this date (ISO 8601, e.g. 2024-08-01)"
        - name: start_date_to
          in: query
          schema:
            type: string
            format: date
          description: "Filter events with start_date <= this date (ISO 8601, e.g. 2025-06-30)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated event search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSearchResponse"

  /clubs/{id}/staff:
    get:
      operationId: getClubStaff
      tags: [clubs]
      summary: Get discovered coaches and staff for a club
      description: >
        Returns all coach and staff records discovered by the staff page
        scraper for the given club. Records are ordered by confidence
        descending, then by name ascending.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Discovered staff for the club
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubStaffResponse"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coaches/search:
    get:
      operationId: searchCoaches
      tags: [search]
      summary: Search coaches by club, title, and minimum confidence score
      parameters:
        - name: club_id
          in: query
          schema:
            type: integer
          description: Filter coaches by canonical club ID
        - name: name
          in: query
          schema:
            type: string
          description: Coach name substring (ILIKE)
        - name: title
          in: query
          schema:
            type: string
          description: Title keyword substring (ILIKE)
        - name: min_confidence
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
          description: Minimum confidence score (0–1)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated coach search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachSearchResponse"

  /analytics/duplicates:
    get:
      operationId: analyticsDuplicates
      tags: [analytics]
      summary: Detect near-duplicate clubs by normalized name and state
      description: >
        Groups clubs by a normalized name (common suffixes like FC, SC, United,
        Academy stripped) within the same state. Returns clusters with two or
        more clubs, indicating likely duplicates or near-duplicates.
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: Limit duplicate detection to a single US state (abbreviation or full name)
        - name: min_clubs
          in: query
          schema:
            type: integer
            default: 2
            minimum: 2
          description: Minimum number of clubs in a cluster to be flagged
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Duplicate clusters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicatesResponse"

  /analytics/coverage:
    get:
      operationId: analyticsCoverage
      tags: [analytics]
      summary: Coverage gaps — per-state and per-league club counts
      description: >
        Returns club counts aggregated by US state and by league affiliation,
        highlighting states below a configurable minimum threshold.
      parameters:
        - name: min_clubs
          in: query
          schema:
            type: integer
            default: 5
            minimum: 1
          description: States with fewer clubs than this threshold are flagged
      responses:
        "200":
          description: Coverage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageResponse"

  /analytics/overlap:
    get:
      operationId: analyticsOverlap
      tags: [analytics]
      summary: Clubs with multiple league affiliations
      description: >
        Returns clubs that appear in more than one league or region directory,
        useful for detecting incorrect source associations or legitimately
        cross-affiliated clubs.
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: Limit results to a single US state
        - name: min_leagues
          in: query
          schema:
            type: integer
            default: 2
            minimum: 2
          description: Minimum number of distinct leagues to be returned
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Overlap results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverlapResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Club:
      type: object
      properties:
        id:
          type: integer
        club_name_canonical:
          type: string
        club_slug:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        status:
          type: string
        website:
          type: string
          nullable: true
        website_status:
          type: string
          nullable: true
      required:
        - id
        - club_name_canonical
        - club_slug
        - city
        - state
        - country
        - status

    Alias:
      type: object
      properties:
        id:
          type: integer
        alias_name:
          type: string
        alias_slug:
          type: string
        source:
          type: string
        is_official:
          type: boolean
      required:
        - id
        - alias_name
        - alias_slug
        - source
        - is_official

    Affiliation:
      type: object
      properties:
        id:
          type: integer
        gender_program:
          type: string
        platform_name:
          type: string
        platform_tier:
          type: string
        conference_name:
          type: string
        division_name:
          type: string
        season:
          type: string
        source_url:
          type: string
        source_name:
          type: string
        verification_status:
          type: string
        notes:
          type: string
      required:
        - id
        - gender_program
        - platform_name
        - platform_tier
        - conference_name
        - division_name
        - season
        - source_url
        - source_name
        - verification_status
        - notes

    League:
      type: object
      properties:
        id:
          type: integer
        league_name:
          type: string
        league_family:
          type: string
        governing_body:
          type: string
        tier_numeric:
          type: integer
        tier_label:
          type: string
        gender:
          type: string
        geographic_scope:
          type: string
        has_public_clubs:
          type: boolean
        scrape_priority:
          type: string
        source_type:
          type: string
        official_url:
          type: string
        notes:
          type: string
      required:
        - id
        - league_name
        - league_family
        - governing_body
        - tier_numeric
        - tier_label
        - gender
        - geographic_scope
        - has_public_clubs
        - scrape_priority
        - source_type
        - official_url
        - notes

    ClubListResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - clubs
        - total
        - page
        - page_size

    ClubDetailResponse:
      allOf:
        - $ref: "#/components/schemas/Club"
        - type: object
          properties:
            aliases:
              type: array
              items:
                $ref: "#/components/schemas/Alias"
            affiliations:
              type: array
              items:
                $ref: "#/components/schemas/Affiliation"
          required:
            - aliases
            - affiliations

    ClubRelatedResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
      required:
        - clubs

    SearchResponse:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/Club"
      required:
        - query
        - results

    LeagueListResponse:
      type: object
      properties:
        leagues:
          type: array
          items:
            $ref: "#/components/schemas/League"
      required:
        - leagues

    LeagueClubsResponse:
      type: object
      properties:
        league_id:
          type: integer
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
      required:
        - league_id
        - clubs

    Event:
      type: object
      properties:
        id:
          type: integer
        club_id:
          type: integer
          nullable: true
        league_name:
          type: string
          nullable: true
        event_id:
          type: string
          nullable: true
        org_season_id:
          type: string
          nullable: true
        age_group:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        division:
          type: string
          nullable: true
        conference:
          type: string
          nullable: true
        season:
          type: string
          nullable: true
        start_date:
          type: string
          nullable: true
        end_date:
          type: string
          nullable: true
        source_url:
          type: string
          nullable: true
      required:
        - id

    Coach:
      type: object
      properties:
        id:
          type: integer
        club_id:
          type: integer
          nullable: true
        name:
          type: string
        title:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        confidence_score:
          type: number
          nullable: true
        source_url:
          type: string
          nullable: true
      required:
        - id
        - name

    CoachDiscovery:
      type: object
      properties:
        id:
          type: integer
        club_id:
          type: integer
          nullable: true
        name:
          type: string
        title:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        source_url:
          type: string
          nullable: true
        scraped_at:
          type: string
          nullable: true
        confidence:
          type: number
          nullable: true
        platform_family:
          type: string
          nullable: true
      required:
        - id
        - name

    ClubStaffResponse:
      type: object
      properties:
        club_id:
          type: integer
        staff:
          type: array
          items:
            $ref: "#/components/schemas/CoachDiscovery"
      required:
        - club_id
        - staff

    ClubSearchResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - clubs
        - total
        - page
        - page_size

    EventSearchResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - events
        - total
        - page
        - page_size

    CoachSearchResponse:
      type: object
      properties:
        coaches:
          type: array
          items:
            $ref: "#/components/schemas/Coach"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - coaches
        - total
        - page
        - page_size

    DuplicateCluster:
      type: object
      properties:
        normalized_name:
          type: string
          description: Club name after stripping common suffixes (FC, SC, United, Academy, etc.)
        state:
          type: string
          nullable: true
        club_count:
          type: integer
        club_ids:
          type: array
          items:
            type: integer
        club_names:
          type: array
          items:
            type: string
      required:
        - normalized_name
        - club_count
        - club_ids
        - club_names

    DuplicatesResponse:
      type: object
      properties:
        duplicates:
          type: array
          items:
            $ref: "#/components/schemas/DuplicateCluster"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - duplicates
        - total
        - page
        - page_size

    StateCoverage:
      type: object
      properties:
        state:
          type: string
        club_count:
          type: integer
        below_threshold:
          type: boolean
      required:
        - state
        - club_count
        - below_threshold

    LeagueCoverage:
      type: object
      properties:
        league:
          type: string
        club_count:
          type: integer
      required:
        - league
        - club_count

    CoverageResponse:
      type: object
      properties:
        summary:
          type: object
          properties:
            total_clubs:
              type: integer
            total_states:
              type: integer
            states_below_threshold:
              type: integer
            threshold:
              type: integer
            website_coverage:
              type: object
              properties:
                with_website:
                  type: integer
                without_website:
                  type: integer
                pct:
                  type: number
        states:
          type: array
          items:
            $ref: "#/components/schemas/StateCoverage"
        leagues:
          type: array
          items:
            $ref: "#/components/schemas/LeagueCoverage"
      required:
        - summary
        - states
        - leagues

    OverlapClub:
      type: object
      properties:
        id:
          type: integer
        club_name_canonical:
          type: string
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        league_count:
          type: integer
        leagues:
          type: array
          items:
            type: string
        gender_programs:
          type: array
          items:
            type: string
      required:
        - id
        - club_name_canonical
        - league_count
        - leagues
        - gender_programs

    OverlapResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/OverlapClub"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - clubs
        - total
        - page
        - page_size
