openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Upshift Data API — youth soccer club graph database
servers:
  - url: /api
    description: Base API path
security:
  - apiKey: []
tags:
  - name: health
    description: Health operations
  - name: clubs
    description: Canonical club operations
  - name: leagues
    description: League directory operations
  - name: search
    description: Fuzzy search operations
  - name: analytics
    description: Duplicate detection, coverage gaps, and league overlap analytics
  - name: colleges
    description: NCAA / NAIA college directory operations
  - name: admin
    description: >
      Human-admin surface mounted at `/v1/admin/*` (full path
      `/api/v1/admin/*`). Accepts either a human session cookie
      (`sessionAuth`, set by POST /v1/admin/auth/login) or an M2M API key
      (`apiKey`). Every admin path advertises both schemes so the dashboard
      and service callers share one contract.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clubs:
    get:
      operationId: listClubs
      tags: [clubs]
      summary: List canonical clubs
      description: >
        Returns a paginated list of canonical clubs. Optionally filter by
        state (exact, case-insensitive), tier (integer 1–4), and gender_program.
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: Filter by US state abbreviation or full name (ILIKE match)
        - name: tier
          in: query
          schema:
            type: integer
          description: Filter by competitive tier (1=National Elite … 4=State)
        - name: gender_program
          in: query
          schema:
            type: string
          description: "Filter by gender program (e.g. boys, girls, boys_and_girls)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated club list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubListResponse"

  /clubs/{id}:
    get:
      operationId: getClub
      tags: [clubs]
      summary: Get a single club with aliases and affiliations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Club detail with aliases and league affiliations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDetailResponse"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clubs/{id}/related:
    get:
      operationId: getRelatedClubs
      tags: [clubs]
      summary: Graph traversal — clubs sharing a league affiliation
      description: >
        Returns clubs that share at least one league affiliation with the given
        club (one-hop neighbourhood in the club-league bipartite graph).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related clubs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubRelatedResponse"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /search:
    get:
      operationId: searchClubs
      tags: [search]
      summary: Fuzzy club name search
      description: >
        Returns ranked clubs whose canonical name or any known alias matches
        the query string (ILIKE). Results are ordered: prefix matches first,
        then substring matches.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /colleges:
    get:
      operationId: listColleges
      tags: [colleges]
      summary: Paginated, filterable list of NCAA colleges
      description: >
        Returns colleges ordered alphabetically by name. The `q` parameter
        runs an ILIKE substring match against the canonical name and is
        what the dashboard's global search uses.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Substring match on the canonical college name (ILIKE)
        - name: division
          in: query
          schema:
            type: string
          description: NCAA division code (D1 / D2 / D3 / NAIA / NJCAA)
        - name: state
          in: query
          schema:
            type: string
          description: US state abbreviation or full name (ILIKE match)
        - name: gender_program
          in: query
          schema:
            type: string
        - name: conference
          in: query
          schema:
            type: string
        - name: scholarship_available
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated college list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollegeListResponse"

  /leagues:
    get:
      operationId: listLeagues
      tags: [leagues]
      summary: List all leagues in the master directory
      responses:
        "200":
          description: Full league inventory ordered by tier then name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueListResponse"

  /leagues/{id}/clubs:
    get:
      operationId: getLeagueClubs
      tags: [leagues]
      summary: Clubs affiliated with a league
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Clubs in the league
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueClubsResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clubs/search:
    get:
      operationId: searchClubsAdvanced
      tags: [clubs]
      summary: Advanced club search with combinable filters
      description: >
        Search clubs by name keyword, state, league affiliation, and/or website
        presence. All filters are combinable. Returns paginated results ordered
        alphabetically by canonical name.
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Substring match on club_name_canonical (ILIKE)
        - name: state
          in: query
          schema:
            type: string
          description: US state abbreviation or full name (ILIKE match)
        - name: league
          in: query
          schema:
            type: string
          description: League name substring to filter by affiliation (ILIKE)
        - name: has_website
          in: query
          schema:
            type: boolean
          description: When true, only clubs with a known website are returned
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated advanced club search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubSearchResponse"

  /events/search:
    get:
      operationId: searchEvents
      tags: [search]
      summary: Search league events by club, league, season, and source
      parameters:
        - name: club_id
          in: query
          schema:
            type: integer
          description: Filter events by canonical club ID
        - name: league
          in: query
          schema:
            type: string
          description: League name substring (ILIKE)
        - name: age_group
          in: query
          schema:
            type: string
          description: Age group (e.g. U14, U15)
        - name: gender
          in: query
          schema:
            type: string
          description: Gender filter (boys, girls)
        - name: season
          in: query
          schema:
            type: string
          description: Season identifier (e.g. 2024-2025)
        - name: source
          in: query
          schema:
            type: string
          description: Source URL substring (ILIKE)
        - name: start_date_from
          in: query
          schema:
            type: string
            format: date
          description: "Filter events with start_date >= this date (ISO 8601, e.g. 2024-08-01)"
        - name: start_date_to
          in: query
          schema:
            type: string
            format: date
          description: "Filter events with start_date <= this date (ISO 8601, e.g. 2025-06-30)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated event search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSearchResponse"

  /clubs/{id}/staff:
    get:
      operationId: getClubStaff
      tags: [clubs]
      summary: Get discovered coaches and staff for a club
      description: >
        Returns all coach and staff records discovered by the staff page
        scraper for the given club. Records are ordered by confidence
        descending, then by name ascending.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Discovered staff for the club
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubStaffResponse"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coaches/search:
    get:
      operationId: searchCoaches
      tags: [search]
      summary: Search coaches by club, title, and minimum confidence score
      parameters:
        - name: club_id
          in: query
          schema:
            type: integer
          description: Filter coaches by canonical club ID
        - name: name
          in: query
          schema:
            type: string
          description: Coach name substring (ILIKE)
        - name: title
          in: query
          schema:
            type: string
          description: Title keyword substring (ILIKE)
        - name: min_confidence
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
          description: Minimum confidence score (0–1)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated coach search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachSearchResponse"

  /analytics/duplicates:
    get:
      operationId: analyticsDuplicates
      tags: [analytics]
      summary: List near-duplicate club pairs with review state
      description: >
        Returns unordered pairs (`club_a_id < club_b_id`) derived from
        normalized-name/state clusters. Each pair includes any persisted
        review decision so an admin UI can walk the queue without a second
        query. The default `status=pending` view hides pairs that were
        already decided as merged or rejected.
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: Limit duplicate detection to a single US state (abbreviation or full name)
        - name: min_clubs
          in: query
          schema:
            type: integer
            default: 2
            minimum: 2
          description: Minimum number of clubs in a cluster to be flagged
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, all, rejected, merged]
            default: pending
          description: >
            Review-state filter. `pending` (default) hides pairs already
            decided as merged or rejected. `all` returns every pair with
            review state attached. `rejected` / `merged` return only pairs
            with that decision.
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Duplicate pairs with review state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicatesResponse"

  /analytics/duplicates/review:
    post:
      operationId: analyticsDuplicatesReview
      tags: [analytics]
      summary: Record a review decision for a near-duplicate club pair
      description: >
        Upserts a `duplicate_review_decisions` row keyed on the normalized
        pair (`club_a_id < club_b_id`; the server swaps the ids if needed).
        `decided_by` is populated from the caller's API key name when
        available, else null. Only records the decision — does not merge.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateReviewRequest"
      responses:
        "200":
          description: Decision row (after upsert)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateReviewDecision"
        "400":
          description: Invalid body, self-pair, or unknown club id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/coverage:
    get:
      operationId: analyticsCoverage
      tags: [analytics]
      summary: Coverage gaps — per-state and per-league club counts
      description: >
        Returns club counts aggregated by US state and by league affiliation,
        highlighting states below a configurable minimum threshold.
      parameters:
        - name: min_clubs
          in: query
          schema:
            type: integer
            default: 5
            minimum: 1
          description: States with fewer clubs than this threshold are flagged
      responses:
        "200":
          description: Coverage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageResponse"

  /analytics/overlap:
    get:
      operationId: analyticsOverlap
      tags: [analytics]
      summary: Clubs with multiple league affiliations
      description: >
        Returns clubs that appear in more than one league or region directory,
        useful for detecting incorrect source associations or legitimately
        cross-affiliated clubs.
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: Limit results to a single US state
        - name: min_leagues
          in: query
          schema:
            type: integer
            default: 2
            minimum: 2
          description: Minimum number of distinct leagues to be returned
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Overlap results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverlapResponse"

  # ===========================================================================
  # Admin surface — `/v1/admin/*`.
  #
  # Every admin path accepts either the human session cookie (`sessionAuth`)
  # or an M2M API key (`apiKey`). OpenAPI treats a `security` array as OR
  # across entries, so listing both means "either suffices".
  #
  # `/v1/admin/auth/login` is the ONE exception — it IS the auth entry point
  # and declares `security: []` (no auth). Rate-limited server-side.
  # ===========================================================================

  /v1/admin/auth/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login (session cookie)
      description: >
        Authenticate an admin user by email + password. On success, sets the
        `upshift_admin_sid` cookie (httpOnly, sameSite=lax) and returns the
        admin identity. The session cookie is the only way to call the rest
        of the admin surface without an API key.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Authenticated; session cookie set in response headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials (generic body — no enumeration oracle)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/auth/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout (clears session cookie)
      description: >
        Delete the server-side session row for the caller's cookie and clear
        the `upshift_admin_sid` cookie. Idempotent — calling with an already
        expired / unknown cookie still returns `{ok: true}`.
      security:
        - sessionAuth: []
        - apiKey: []
      responses:
        "200":
          description: Session destroyed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLogoutResponse"

  /v1/admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Current admin identity
      description: >
        Echo the caller's identity (id, email, role). For session callers the
        fields come straight from `admin_users`; for API-key callers the
        server synthesizes a service-account identity (`apikey+<name>@…`).
      security:
        - sessionAuth: []
        - apiKey: []
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResponse"

  /v1/admin/scrape-runs:
    get:
      operationId: listScrapeRuns
      tags: [admin]
      summary: List scrape-run log entries
      description: >
        Read-only view onto `scrape_run_logs`, newest first. `status` accepts
        the DB enum (`running | ok | partial | failed`) plus legacy aliases
        (`success` → `ok|partial`, `failure` → `failed`).
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: ISO-8601 lower bound on `started_at`
        - name: source
          in: query
          schema:
            type: string
          description: Exact match on `scraper_key`
        - name: status
          in: query
          schema:
            type: string
          description: One of `running|ok|partial|failed|success|failure`
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: limit
          in: query
          schema:
            type: integer
          description: Alias for page_size
      responses:
        "200":
          description: Paginated ScrapeRunLog rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeRunLogList"

  /v1/admin/scrape-runs/{id}:
    get:
      operationId: getScrapeRun
      tags: [admin]
      summary: Get a single scrape-run row
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: One ScrapeRunLog row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeRunLog"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scrape-health:
    get:
      operationId: listScrapeHealth
      tags: [admin]
      summary: Rolling scrape-health rollup per entity
      description: >
        Read-only view onto `scrape_health`. The response envelope is
        `{rows, total}` — pagination is server-side only via `page` /
        `page_size`; the contract itself doesn't echo page numbers.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Scrape-health rollup rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeHealthList"

  /v1/admin/scrape-health/{entity_type}/{entity_id}:
    get:
      operationId: getScrapeHealth
      tags: [admin]
      summary: Get one scrape-health row by (entity_type, entity_id)
      description: >
        `scrape_health` is keyed by `(entity_type, entity_id)` — not a
        surrogate id — so the detail route is 2-segment.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: entity_type
          in: path
          required: true
          schema:
            type: string
            enum: [club, event, league, college, coach]
        - name: entity_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: One ScrapeHealth row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeHealthRow"
        "400":
          description: Invalid entity_type or entity_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/dedup/clubs:
    get:
      operationId: listClubDuplicates
      tags: [admin]
      summary: List club-duplicate pairs in the review queue
      description: >
        Populated by `scraper/dedup/club_dedup.py --persist`. Default status
        is `pending`; pass `status=merged|rejected|all` to widen. Rows are
        sorted by score DESC so the strongest candidates surface first.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, merged, rejected, all]
            default: pending
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: limit
          in: query
          schema:
            type: integer
          description: Alias for page_size
      responses:
        "200":
          description: Paginated ClubDuplicate rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDuplicateList"

  /v1/admin/dedup/clubs/{id}:
    get:
      operationId: getClubDuplicate
      tags: [admin]
      summary: Club-duplicate detail with live side-by-side context
      description: >
        Extends the queue row with the live `canonical_clubs` rows on both
        sides plus affiliation and roster-snapshot counts — everything a
        reviewer needs on one screen.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ClubDuplicateDetail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDuplicateDetail"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/dedup/clubs/{id}/merge:
    post:
      operationId: mergeClubDuplicate
      tags: [admin]
      summary: Merge a duplicate-club pair (transactional reparent + alias)
      description: >
        Invokes the transactional `mergeClubs` helper. The 18-field helper
        result is logged server-side; only the 5-field contract projection
        (`ok`, `winnerId`, `loserAliasesCreated`, `affiliationsReparented`,
        `rosterSnapshotsReparented`) returns to the caller.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubDuplicateMergeRequest"
      responses:
        "200":
          description: Merge succeeded; queue row flipped to `status=merged`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDuplicateMergeResponse"
        "400":
          description: Invalid id, body, or (winner, loser) mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pair not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Pair already reviewed (status != pending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/dedup/clubs/{id}/reject:
    post:
      operationId: rejectClubDuplicate
      tags: [admin]
      summary: Reject a duplicate-club pair (no merge performed)
