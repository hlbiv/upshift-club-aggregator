openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Upshift Data API — youth soccer club graph database
servers:
  - url: /api
    description: Base API path
security:
  - apiKey: []
tags:
  - name: health
    description: Health operations
  - name: clubs
    description: Canonical club operations
  - name: leagues
    description: League directory operations
  - name: search
    description: Fuzzy search operations
  - name: analytics
    description: Duplicate detection, coverage gaps, and league overlap analytics
  - name: admin
    description: >
      Human-admin surface mounted at `/v1/admin/*` (full path
      `/api/v1/admin/*`). Accepts either a human session cookie
      (`sessionAuth`, set by POST /v1/admin/auth/login) or an M2M API key
      (`apiKey`). Every admin path advertises both schemes so the dashboard
      and service callers share one contract.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clubs:
    get:
      operationId: listClubs
      tags: [clubs]
      summary: List canonical clubs
      description: >
        Returns a paginated list of canonical clubs. Optionally filter by
        state (exact, case-insensitive), tier (integer 1–4), and gender_program.
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: Filter by US state abbreviation or full name (ILIKE match)
        - name: tier
          in: query
          schema:
            type: integer
          description: Filter by competitive tier (1=National Elite … 4=State)
        - name: gender_program
          in: query
          schema:
            type: string
          description: "Filter by gender program (e.g. boys, girls, boys_and_girls)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated club list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubListResponse"

  /clubs/{id}:
    get:
      operationId: getClub
      tags: [clubs]
      summary: Get a single club with aliases and affiliations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Club detail with aliases and league affiliations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDetailResponse"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clubs/{id}/related:
    get:
      operationId: getRelatedClubs
      tags: [clubs]
      summary: Graph traversal — clubs sharing a league affiliation
      description: >
        Returns clubs that share at least one league affiliation with the given
        club (one-hop neighbourhood in the club-league bipartite graph).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related clubs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubRelatedResponse"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /search:
    get:
      operationId: searchClubs
      tags: [search]
      summary: Fuzzy club name search
      description: >
        Returns ranked clubs whose canonical name or any known alias matches
        the query string (ILIKE). Results are ordered: prefix matches first,
        then substring matches.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /leagues:
    get:
      operationId: listLeagues
      tags: [leagues]
      summary: List all leagues in the master directory
      responses:
        "200":
          description: Full league inventory ordered by tier then name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueListResponse"

  /leagues/{id}/clubs:
    get:
      operationId: getLeagueClubs
      tags: [leagues]
      summary: Clubs affiliated with a league
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Clubs in the league
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueClubsResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clubs/search:
    get:
      operationId: searchClubsAdvanced
      tags: [clubs]
      summary: Advanced club search with combinable filters
      description: >
        Search clubs by name keyword, state, league affiliation, and/or website
        presence. All filters are combinable. Returns paginated results ordered
        alphabetically by canonical name.
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Substring match on club_name_canonical (ILIKE)
        - name: state
          in: query
          schema:
            type: string
          description: US state abbreviation or full name (ILIKE match)
        - name: league
          in: query
          schema:
            type: string
          description: League name substring to filter by affiliation (ILIKE)
        - name: has_website
          in: query
          schema:
            type: boolean
          description: When true, only clubs with a known website are returned
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated advanced club search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubSearchResponse"

  /events/search:
    get:
      operationId: searchEvents
      tags: [search]
      summary: Search league events by club, league, season, and source
      parameters:
        - name: club_id
          in: query
          schema:
            type: integer
          description: Filter events by canonical club ID
        - name: league
          in: query
          schema:
            type: string
          description: League name substring (ILIKE)
        - name: age_group
          in: query
          schema:
            type: string
          description: Age group (e.g. U14, U15)
        - name: gender
          in: query
          schema:
            type: string
          description: Gender filter (boys, girls)
        - name: season
          in: query
          schema:
            type: string
          description: Season identifier (e.g. 2024-2025)
        - name: source
          in: query
          schema:
            type: string
          description: Source URL substring (ILIKE)
        - name: start_date_from
          in: query
          schema:
            type: string
            format: date
          description: "Filter events with start_date >= this date (ISO 8601, e.g. 2024-08-01)"
        - name: start_date_to
          in: query
          schema:
            type: string
            format: date
          description: "Filter events with start_date <= this date (ISO 8601, e.g. 2025-06-30)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated event search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSearchResponse"

  /clubs/{id}/staff:
    get:
      operationId: getClubStaff
      tags: [clubs]
      summary: Get discovered coaches and staff for a club
      description: >
        Returns all coach and staff records discovered by the staff page
        scraper for the given club. Records are ordered by confidence
        descending, then by name ascending.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Discovered staff for the club
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubStaffResponse"
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coaches/search:
    get:
      operationId: searchCoaches
      tags: [search]
      summary: Search coaches by club, title, and minimum confidence score
      parameters:
        - name: club_id
          in: query
          schema:
            type: integer
          description: Filter coaches by canonical club ID
        - name: name
          in: query
          schema:
            type: string
          description: Coach name substring (ILIKE)
        - name: title
          in: query
          schema:
            type: string
          description: Title keyword substring (ILIKE)
        - name: min_confidence
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
          description: Minimum confidence score (0–1)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated coach search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachSearchResponse"

  /analytics/duplicates:
    get:
      operationId: analyticsDuplicates
      tags: [analytics]
      summary: List near-duplicate club pairs with review state
      description: >
        Returns unordered pairs (`club_a_id < club_b_id`) derived from
        normalized-name/state clusters. Each pair includes any persisted
        review decision so an admin UI can walk the queue without a second
        query. The default `status=pending` view hides pairs that were
        already decided as merged or rejected.
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: Limit duplicate detection to a single US state (abbreviation or full name)
        - name: min_clubs
          in: query
          schema:
            type: integer
            default: 2
            minimum: 2
          description: Minimum number of clubs in a cluster to be flagged
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, all, rejected, merged]
            default: pending
          description: >
            Review-state filter. `pending` (default) hides pairs already
            decided as merged or rejected. `all` returns every pair with
            review state attached. `rejected` / `merged` return only pairs
            with that decision.
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Duplicate pairs with review state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicatesResponse"

  /analytics/duplicates/review:
    post:
      operationId: analyticsDuplicatesReview
      tags: [analytics]
      summary: Record a review decision for a near-duplicate club pair
      description: >
        Upserts a `duplicate_review_decisions` row keyed on the normalized
        pair (`club_a_id < club_b_id`; the server swaps the ids if needed).
        `decided_by` is populated from the caller's API key name when
        available, else null. Only records the decision — does not merge.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateReviewRequest"
      responses:
        "200":
          description: Decision row (after upsert)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateReviewDecision"
        "400":
          description: Invalid body, self-pair, or unknown club id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/coverage:
    get:
      operationId: analyticsCoverage
      tags: [analytics]
      summary: Coverage gaps — per-state and per-league club counts
      description: >
        Returns club counts aggregated by US state and by league affiliation,
        highlighting states below a configurable minimum threshold.
      parameters:
        - name: min_clubs
          in: query
          schema:
            type: integer
            default: 5
            minimum: 1
          description: States with fewer clubs than this threshold are flagged
      responses:
        "200":
          description: Coverage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageResponse"

  /analytics/overlap:
    get:
      operationId: analyticsOverlap
      tags: [analytics]
      summary: Clubs with multiple league affiliations
      description: >
        Returns clubs that appear in more than one league or region directory,
        useful for detecting incorrect source associations or legitimately
        cross-affiliated clubs.
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: Limit results to a single US state
        - name: min_leagues
          in: query
          schema:
            type: integer
            default: 2
            minimum: 2
          description: Minimum number of distinct leagues to be returned
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Overlap results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverlapResponse"

  # ===========================================================================
  # Admin surface — `/v1/admin/*`.
  #
  # Every admin path accepts either the human session cookie (`sessionAuth`)
  # or an M2M API key (`apiKey`). OpenAPI treats a `security` array as OR
  # across entries, so listing both means "either suffices".
  #
  # `/v1/admin/auth/login` is the ONE exception — it IS the auth entry point
  # and declares `security: []` (no auth). Rate-limited server-side.
  # ===========================================================================

  /v1/admin/auth/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login (session cookie)
      description: >
        Authenticate an admin user by email + password. On success, sets the
        `upshift_admin_sid` cookie (httpOnly, sameSite=lax) and returns the
        admin identity. The session cookie is the only way to call the rest
        of the admin surface without an API key.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Authenticated; session cookie set in response headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials (generic body — no enumeration oracle)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/auth/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout (clears session cookie)
      description: >
        Delete the server-side session row for the caller's cookie and clear
        the `upshift_admin_sid` cookie. Idempotent — calling with an already
        expired / unknown cookie still returns `{ok: true}`.
      security:
        - sessionAuth: []
        - apiKey: []
      responses:
        "200":
          description: Session destroyed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLogoutResponse"

  /v1/admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Current admin identity
      description: >
        Echo the caller's identity (id, email, role). For session callers the
        fields come straight from `admin_users`; for API-key callers the
        server synthesizes a service-account identity (`apikey+<name>@…`).
      security:
        - sessionAuth: []
        - apiKey: []
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResponse"

  /v1/admin/scrape-runs:
    get:
      operationId: listScrapeRuns
      tags: [admin]
      summary: List scrape-run log entries
      description: >
        Read-only view onto `scrape_run_logs`, newest first. `status` accepts
        the DB enum (`running | ok | partial | failed`) plus legacy aliases
        (`success` → `ok|partial`, `failure` → `failed`).
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: ISO-8601 lower bound on `started_at`
        - name: source
          in: query
          schema:
            type: string
          description: Exact match on `scraper_key`
        - name: status
          in: query
          schema:
            type: string
          description: One of `running|ok|partial|failed|success|failure`
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: limit
          in: query
          schema:
            type: integer
          description: Alias for page_size
      responses:
        "200":
          description: Paginated ScrapeRunLog rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeRunLogList"

  /v1/admin/scrape-runs/{id}:
    get:
      operationId: getScrapeRun
      tags: [admin]
      summary: Get a single scrape-run row
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: One ScrapeRunLog row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeRunLog"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scrape-health:
    get:
      operationId: listScrapeHealth
      tags: [admin]
      summary: Rolling scrape-health rollup per entity
      description: >
        Read-only view onto `scrape_health`. The response envelope is
        `{rows, total}` — pagination is server-side only via `page` /
        `page_size`; the contract itself doesn't echo page numbers.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Scrape-health rollup rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeHealthList"

  /v1/admin/scrape-health/{entity_type}/{entity_id}:
    get:
      operationId: getScrapeHealth
      tags: [admin]
      summary: Get one scrape-health row by (entity_type, entity_id)
      description: >
        `scrape_health` is keyed by `(entity_type, entity_id)` — not a
        surrogate id — so the detail route is 2-segment.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: entity_type
          in: path
          required: true
          schema:
            type: string
            enum: [club, event, league, college, coach]
        - name: entity_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: One ScrapeHealth row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeHealthRow"
        "400":
          description: Invalid entity_type or entity_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/dedup/clubs:
    get:
      operationId: listClubDuplicates
      tags: [admin]
      summary: List club-duplicate pairs in the review queue
      description: >
        Populated by `scraper/dedup/club_dedup.py --persist`. Default status
        is `pending`; pass `status=merged|rejected|all` to widen. Rows are
        sorted by score DESC so the strongest candidates surface first.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, merged, rejected, all]
            default: pending
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: limit
          in: query
          schema:
            type: integer
          description: Alias for page_size
      responses:
        "200":
          description: Paginated ClubDuplicate rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDuplicateList"

  /v1/admin/dedup/clubs/{id}:
    get:
      operationId: getClubDuplicate
      tags: [admin]
      summary: Club-duplicate detail with live side-by-side context
      description: >
        Extends the queue row with the live `canonical_clubs` rows on both
        sides plus affiliation and roster-snapshot counts — everything a
        reviewer needs on one screen.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ClubDuplicateDetail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDuplicateDetail"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/dedup/clubs/{id}/merge:
    post:
      operationId: mergeClubDuplicate
      tags: [admin]
      summary: Merge a duplicate-club pair (transactional reparent + alias)
      description: >
        Invokes the transactional `mergeClubs` helper. The 18-field helper
        result is logged server-side; only the 5-field contract projection
        (`ok`, `winnerId`, `loserAliasesCreated`, `affiliationsReparented`,
        `rosterSnapshotsReparented`) returns to the caller.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubDuplicateMergeRequest"
      responses:
        "200":
          description: Merge succeeded; queue row flipped to `status=merged`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDuplicateMergeResponse"
        "400":
          description: Invalid id, body, or (winner, loser) mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pair not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Pair already reviewed (status != pending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/dedup/clubs/{id}/reject:
    post:
      operationId: rejectClubDuplicate
      tags: [admin]
      summary: Reject a duplicate-club pair (no merge performed)
      description: >
        Flips the queue row to `status=rejected` with optional `notes`. No
        data reparenting; the two clubs remain separate canonical rows.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubDuplicateRejectRequest"
      responses:
        "200":
          description: Pair marked rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDuplicateRejectResponse"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pair not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Pair already reviewed (status != pending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/ga-premier-orphans:
    post:
      operationId: gaPremierOrphanCleanup
      tags: [admin]
      summary: Scan or delete GA Premier nav-token orphans in club_roster_snapshots
      description: >
        Identifies `club_roster_snapshots` rows whose `club_name_raw` is a
        nav-menu token (FACILITIES, STAFF, NEWS, …) rather than a real club
        name. Default `dryRun=true` returns counts + sample names; pass
        `dryRun=false` to DELETE up to `limit` matching rows in a transaction.
      security:
        - sessionAuth: []
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GaPremierOrphanCleanupRequest"
      responses:
        "200":
          description: Scan or delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GaPremierOrphanCleanupResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/empty-staff-pages:
    get:
      operationId: getEmptyStaffPages
      tags: [admin]
      summary: Clubs with a staff_page_url set but no recent coach discoveries
      description: >
        Paginated list of `canonical_clubs` rows whose `staff_page_url` is
        populated but have zero distinct `coach_discoveries` rows in the
        last `window_days` days. Good candidates for a re-scrape or a
        broken-extractor fix.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: window_days
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of empty-staff-pages rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyStaffPagesResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/nav-leaked-names:
    get:
      operationId: getNavLeakedNames
      tags: [admin]
      summary: Roster snapshots flagged as having a nav-menu string leak
      description: >
        Paginated list of `roster_quality_flags` rows with
        `flag_type = 'nav_leaked_name'`, joined to the parent
        `club_roster_snapshots` and the snapshot's `canonical_clubs`
        resolution (if any — `club_id` is NULL until the canonical-club
        linker runs). `leakedStrings` and `snapshotRosterSize` are extracted
        from the flag row's jsonb `metadata` into typed response fields;
        callers never see the raw jsonb. `resolvedByEmail` is joined from
        `admin_users.email` if the flag has been resolved.

        Phase 1 scope: the table is populated by Phase 2 scraper detection —
        this endpoint returns an empty list at merge time by design.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: include_resolved
          in: query
          description: If true, include rows whose `resolved_at` is set. Default false.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Paginated list of nav-leaked-name rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavLeakedNamesResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/roster-quality-flags/{id}/resolve:
    patch:
      operationId: resolveRosterQualityFlag
      tags: [admin]
      summary: Mark a roster_quality_flags row as resolved
      description: >
        Stamps `resolved_at = NOW()` and `resolved_by = <admin user id>`
        on the row. The underlying `club_roster_snapshots` row is NOT
        mutated — resolving a flag means "operator has triaged this
        leak", not "the data is fixed".

        API-key callers get `resolved_by = NULL` (no admin user identity);
        session callers get their admin user id stamped — same pattern as
        the dedup PATCH endpoints.

        Returns 400 if the flag is already resolved, and 404 if no
        `nav_leaked_name` flag exists with that id.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: Flag resolved
        "400":
          description: Invalid id or flag already resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No nav_leaked_name flag with that id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/coach-quality-flags:
    get:
      operationId: getCoachQualityFlags
      tags: [admin]
      summary: coach_quality_flags canary rows, joined with coach + club context
      description: >
        Paginated list of `coach_quality_flags` rows, joined to the parent
        `coach_discoveries` (surfacing `coach_name`, `coach_email`,
        `club_name_raw`), the snapshot's `canonical_clubs` resolution (for
        a `club_display_name` when the discovery's `club_id` is set), and
        `admin_users` (for `resolved_by_email`). Callers never see raw
        jsonb — any typed metadata extraction happens at the API boundary
        on a per-flag-type basis (today the whole jsonb payload is returned
        verbatim in `metadata` as a `record<unknown>`; a future PR can
        promote per-flag fields into typed columns once the pollution
        investigation has settled on a stable contract).

        Phase 3 scope: the table is populated by PR 1 (shared guard +
        scraper wiring) and PR 2 (purge script audit rows) of the 3-PR
        coach-pollution remediation. This endpoint returns an empty list
        at PR-3 merge time by design.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: flag_type
          in: query
          description: Optional filter by flag_type. Matches the CHECK list verbatim.
          schema:
            type: string
            enum:
              - looks_like_name_reject
              - role_label_as_name
              - corrupt_email
              - nav_leaked
        - name: resolved
          in: query
          description: >
            If true, return only resolved flags; if false, return only
            active (unresolved) flags; if omitted, return both.
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of coach-quality-flag rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachQualityFlagsResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/coach-quality-flags/{id}/resolve:
    patch:
      operationId: resolveCoachQualityFlag
      tags: [admin]
      summary: Mark a coach_quality_flags row as resolved
      description: >
        Stamps `resolved_at = NOW()` and `resolved_by = <admin user id>`
        on the row. The underlying `coach_discoveries` row is NOT mutated
        — resolving a flag means "operator has triaged this canary", not
        "the data is fixed".

        API-key callers get `resolved_by = NULL` (no admin user identity);
        session callers get their admin user id stamped — same pattern as
        the dedup PATCH endpoints and the roster-quality-flags resolve
        endpoint.

        Returns 400 if the flag is already resolved, and 404 if no
        `coach_quality_flags` row exists with that id.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: Flag resolved
        "400":
          description: Invalid id or flag already resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No coach_quality_flags row with that id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/stale-scrapes:
    get:
      operationId: getStaleScrapes
      tags: [admin]
      summary: scrape_health entities whose last_scraped_at exceeds a threshold
      description: >
        Paginated list of `scrape_health` rows whose `last_scraped_at` is
        older than `threshold_days` days or NULL. `entityName` is a
        best-effort human label joined from `canonical_clubs` /
        `leagues_master` / `colleges` / `coaches` per `entity_type`; when
        the join fails (deleted entity, unjoinable type) it is null.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: threshold_days
          in: query
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 365
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of stale-scrape rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaleScrapesResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/growth/scraped-counts:
    get:
      operationId: getGrowthScrapedCounts
      tags: [admin]
      summary: Records-added-since-X delta across five headline ingest tables
      description: >
        Per-table `count(*) WHERE <timestamp_col> > since`. Timestamp column
        differs per table — `canonical_clubs.last_scraped_at`,
        `coaches.first_seen_at`, `events.last_scraped_at`,
        `club_roster_snapshots.snapshot_date`, `matches.scraped_at`.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: since
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: ISO-8601 lower bound
      responses:
        "200":
          description: Per-table deltas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapedCountsDelta"
        "400":
          description: Missing or invalid `since`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/growth/coverage-trend:
    get:
      operationId: getGrowthCoverageTrend
      tags: [admin]
      summary: Daily scrape-run telemetry points over a rolling window
      description: >
        Aggregates `scrape_run_logs` by day for the last `days` days.
        `successes` counts `status='ok'`; `failures` counts
        `status IN ('partial','failed')`. `running` rows contribute to `runs`
        but not to successes/failures.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
          description: Size of the rolling window in days
      responses:
        "200":
          description: Daily trend points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageTrendResponse"
        "400":
          description: Invalid `days`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scraper-schedules:
    get:
      operationId: listScraperSchedules
      tags: [admin]
      summary: List all known scraper schedules with metadata + recent runs
      description: >
        Returns every jobKey in the server-side allow-list plus its curated
        `description`, `cronExpression` (null for Run-Now-only jobs), and
        the last N `scheduler_jobs` rows. Adding a new allow-listed jobKey
        to the server causes it to appear here automatically — the dashboard
        renders dynamically from this payload.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: limit
          in: query
          description: Recent runs per schedule (default 10, max 100).
          schema:
            type: integer
            default: 10
            maximum: 100
      responses:
        "200":
          description: All known schedules with their recent runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScraperSchedulesResponse"
        "400":
          description: Invalid limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scraper-schedules/{jobKey}/runs:
    get:
      operationId: listScraperScheduleRuns
      tags: [admin]
      summary: List recent scheduler-job rows for a given jobKey
      description: >
        Newest-first by `requested_at`. Default `limit` 20, max 100.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: jobKey
          in: path
          required: true
          schema:
            type: string
            enum: [nightly_tier1, weekly_state, hourly_linker]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Job rows for this jobKey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerJobList"
        "400":
          description: Unknown jobKey or invalid limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scraper-schedules/{jobKey}/run:
    post:
      operationId: runScraperScheduleNow
      tags: [admin]
      summary: Enqueue a one-off run of an allow-listed scheduler jobKey
      description: >
        Inserts a `scheduler_jobs` row at `status=pending`; the in-process
        worker picks it up on its next tick. Guarded by `requireSuperAdmin`
        (session-only) plus the 30/min mutation rate limiter. Body `args`
        are forwarded as CLI flags by the worker.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: jobKey
          in: path
          required: true
          schema:
            type: string
            enum: [nightly_tier1, weekly_state, hourly_linker]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunNowRequest"
      responses:
        "201":
          description: Enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunNowResponse"
        "400":
          description: Unknown jobKey or invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not a super_admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scheduler-jobs/{id}:
    get:
      operationId: getSchedulerJob
      tags: [admin]
      summary: Get a single scheduler_jobs row by id
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: One SchedulerJob row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerJob"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        Machine-to-machine authentication. Mint a key with
        `scripts/src/create-api-key.ts` on Replit and send the plaintext in
        this header on every request. Server also accepts
        `Authorization: Bearer <key>` as an alternative. Gated by the
        `API_KEY_AUTH_ENABLED` env var; when unset, auth is skipped
        entirely (bootstrap mode). `/healthz` is exempt.
    sessionAuth:
      type: apiKey
      in: cookie
      name: upshift_admin_sid
      description: >
        Human admin session cookie (httpOnly, sameSite=lax), set by
        `POST /v1/admin/auth/login`. TTL is enforced server-side via
        `admin_sessions.expires_at`. Logout (`POST /v1/admin/auth/logout`)
        clears the cookie. The same routes that accept `sessionAuth` also
        accept an M2M `apiKey` header — either is sufficient.
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Club:
      type: object
      properties:
        id:
          type: integer
        club_name_canonical:
          type: string
        club_slug:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        status:
          type: string
        website:
          type: string
          nullable: true
        website_status:
          type: string
          nullable: true
      required:
        - id
        - club_name_canonical
        - club_slug
        - city
        - state
        - country
        - status

    Alias:
      type: object
      properties:
        id:
          type: integer
        alias_name:
          type: string
        alias_slug:
          type: string
        source:
          type: string
        is_official:
          type: boolean
      required:
        - id
        - alias_name
        - alias_slug
        - source
        - is_official

    Affiliation:
      type: object
      properties:
        id:
          type: integer
        gender_program:
          type: string
        platform_name:
          type: string
        platform_tier:
          type: string
        conference_name:
          type: string
        division_name:
          type: string
        season:
          type: string
        source_url:
          type: string
        source_name:
          type: string
        verification_status:
          type: string
        notes:
          type: string
      required:
        - id
        - gender_program
        - platform_name
        - platform_tier
        - conference_name
        - division_name
        - season
        - source_url
        - source_name
        - verification_status
        - notes

    League:
      type: object
      properties:
        id:
          type: integer
        league_name:
          type: string
        league_family:
          type: string
        governing_body:
          type: string
        tier_numeric:
          type: integer
        tier_label:
          type: string
        gender:
          type: string
        geographic_scope:
          type: string
        has_public_clubs:
          type: boolean
        scrape_priority:
          type: string
        source_type:
          type: string
        official_url:
          type: string
        notes:
          type: string
      required:
        - id
        - league_name
        - league_family
        - governing_body
        - tier_numeric
        - tier_label
        - gender
        - geographic_scope
        - has_public_clubs
        - scrape_priority
        - source_type
        - official_url
        - notes

    ClubListResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - clubs
        - total
        - page
        - page_size

    ClubDetailResponse:
      allOf:
        - $ref: "#/components/schemas/Club"
        - type: object
          properties:
            aliases:
              type: array
              items:
                $ref: "#/components/schemas/Alias"
            affiliations:
              type: array
              items:
                $ref: "#/components/schemas/Affiliation"
          required:
            - aliases
            - affiliations

    ClubRelatedResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
      required:
        - clubs

    SearchResponse:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/Club"
      required:
        - query
        - results

    LeagueListResponse:
      type: object
      properties:
        leagues:
          type: array
          items:
            $ref: "#/components/schemas/League"
      required:
        - leagues

    LeagueClubsResponse:
      type: object
      properties:
        league_id:
          type: integer
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
      required:
        - league_id
        - clubs

    Event:
      type: object
      properties:
        id:
          type: integer
        club_id:
          type: integer
          nullable: true
        league_name:
          type: string
          nullable: true
        event_id:
          type: string
          nullable: true
        org_season_id:
          type: string
          nullable: true
        age_group:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        division:
          type: string
          nullable: true
        conference:
          type: string
          nullable: true
        season:
          type: string
          nullable: true
        start_date:
          type: string
          nullable: true
        end_date:
          type: string
          nullable: true
        source_url:
          type: string
          nullable: true
      required:
        - id

    Coach:
      type: object
      properties:
        id:
          type: integer
        club_id:
          type: integer
          nullable: true
        name:
          type: string
        title:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        confidence_score:
          type: number
          nullable: true
        source_url:
          type: string
          nullable: true
      required:
        - id
        - name

    CoachDiscovery:
      type: object
      properties:
        id:
          type: integer
        club_id:
          type: integer
          nullable: true
        name:
          type: string
        title:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        source_url:
          type: string
          nullable: true
        scraped_at:
          type: string
          nullable: true
        confidence:
          type: number
          nullable: true
        platform_family:
          type: string
          nullable: true
      required:
        - id
        - name

    ClubStaffResponse:
      type: object
      properties:
        club_id:
          type: integer
        staff:
          type: array
          items:
            $ref: "#/components/schemas/CoachDiscovery"
      required:
        - club_id
        - staff

    ClubSearchResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - clubs
        - total
        - page
        - page_size

    EventSearchResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - events
        - total
        - page
        - page_size

    CoachSearchResponse:
      type: object
      properties:
        coaches:
          type: array
          items:
            $ref: "#/components/schemas/Coach"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - coaches
        - total
        - page
        - page_size

    DuplicateReview:
      type: object
      description: Review decision attached to a duplicate pair (null when no row exists)
      properties:
        decision:
          type: string
          enum: [pending, merged, rejected]
        decided_by:
          type: string
          nullable: true
        decided_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - decision

    DuplicateCluster:
      type: object
      description: One near-duplicate pair (the enclosing cluster's context is included for UI display).
      properties:
        normalized_name:
          type: string
          description: Club name after stripping common suffixes (FC, SC, United, Academy, etc.)
        state:
          type: string
          nullable: true
        club_count:
          type: integer
          description: Number of clubs in the enclosing cluster (>= 2)
        club_ids:
          type: array
          items:
            type: integer
        club_names:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: string
          description: Distinct league/source names the clustered clubs appear in
