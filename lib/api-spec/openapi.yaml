          nullable: true
        resolvedByEmail:
          type: string
          nullable: true
        resolutionReason:
          type: string
          enum: [resolved, dismissed]
          nullable: true
      required:
        - id
        - snapshotId
        - clubId
        - clubNameCanonical
        - leakedStrings
        - snapshotRosterSize
        - flaggedAt
        - resolvedAt
        - resolvedByEmail
        - resolutionReason

