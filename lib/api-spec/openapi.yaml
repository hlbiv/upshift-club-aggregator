            type: integer
            minimum: 1
      responses:
        "204":
          description: Flag resolved
        "400":
          description: Invalid id or flag already resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No coach_quality_flags row with that id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/colleges/{id}/resolve-url:
    patch:
      operationId: resolveCollegeUrl
      tags: [admin, data-quality]
      summary: Set soccer_program_url and resolve open url_needs_review flags
      description: >
