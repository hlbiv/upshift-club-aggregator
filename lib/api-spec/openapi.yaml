  /v1/admin/data-quality/nav-leaked-names:
    get:
      operationId: getNavLeakedNames
      tags: [admin]
      summary: Roster snapshots flagged as having a nav-menu string leak
      description: >
        Paginated list of `roster_quality_flags` rows with
        `flag_type = 'nav_leaked_name'`, joined to the parent
        `club_roster_snapshots` and the snapshot's `canonical_clubs`
        resolution (if any — `club_id` is NULL until the canonical-club
        linker runs). `leakedStrings` and `snapshotRosterSize` are extracted
        from the flag row's jsonb `metadata` into typed response fields;
        callers never see the raw jsonb. `resolvedByEmail` is joined from
        `admin_users.email` if the flag has been resolved.

        Phase 1 scope: the table is populated by Phase 2 scraper detection —
        this endpoint returns an empty list at merge time by design.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: state
          in: query
          description: >
            Which flags to return. `open` surfaces unresolved flags only
            (default — the typical triage view); `resolved` returns flags
            closed with `resolution_reason='resolved'` (legitimate leaks
            that were cleaned up out of band); `dismissed` returns flags
            closed with `resolution_reason='dismissed'` (false positives);
            `all` returns every state. Replaces the previous boolean
            `include_resolved` param.
          schema:
            type: string
            enum: [open, resolved, dismissed, all]
            default: open
      responses:
        "200":
          description: Paginated list of nav-leaked-name rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavLeakedNamesResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/numeric-only-names:
    get:
      operationId: getNumericOnlyNames
      tags: [admin]
      summary: Roster snapshots flagged as having numeric-only player names
      description: >
        Paginated list of `roster_quality_flags` rows with
        `flag_type = 'numeric_only_name'`, joined to the parent
        `club_roster_snapshots` and the snapshot's `canonical_clubs`
        resolution (if any — `club_id` is NULL until the canonical-club
        linker runs). `numericStrings` and `snapshotRosterSize` are
        extracted from the flag row's jsonb `metadata` into typed response
        fields; callers never see the raw jsonb. `resolvedByEmail` is
        joined from `admin_users.email` if the flag has been resolved.

        Flagged snapshot-groups are ones where `player_name` consists
        entirely of digits, separators (`/`, `-`, `.`), and whitespace —
        common scraper bug where the jersey-number column is misparsed as
        the name column, or a date cell ends up where a name should be.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: state
          in: query
          description: >
            Which flags to return. Semantics identical to the
            nav-leaked-names endpoint — `open` surfaces unresolved flags
            only (default), `resolved` / `dismissed` surface closed flags
            by resolution reason, `all` drops the filter.
          schema:
            type: string
            enum: [open, resolved, dismissed, all]
            default: open
      responses:
        "200":
          description: Paginated list of numeric-only-name rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NumericOnlyNamesResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/roster-quality-flags/{id}/resolve:
    patch:
      operationId: resolveRosterQualityFlag
      tags: [admin]
      summary: Mark a roster_quality_flags row as resolved or dismissed
      description: >
        Stamps `resolved_at = NOW()`, `resolved_by = <admin user id>`, and
        `resolution_reason = <reason>` on the row. The underlying
        `club_roster_snapshots` row is NOT mutated.

        The `reason` field splits the triage action into two operator
        intents:
          * `resolved` — the flag was legitimate; the operator has cleaned
            up the leak out of band (e.g. fixed the extractor, re-scraped
            the club). Snapshot history stays immutable.
          * `dismissed` — false positive; the detector flagged something
            that wasn't actually a nav-menu leak.

        API-key callers get `resolved_by = NULL` (no admin user identity);
        session callers get their admin user id stamped — same pattern as
        the dedup PATCH endpoints.

        Returns 400 if the body is missing / invalid, or if the flag is
        already resolved (either reason — second attempts always 400
        regardless of whether the new reason matches the stored one).
        Returns 404 if no flag exists with that id.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRosterQualityFlagRequest"
      responses:
        "204":
          description: Flag resolved
        "400":
          description: Invalid id, invalid body, or flag already resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No nav_leaked_name flag with that id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/coach-quality-flags:
    get:
      operationId: getCoachQualityFlags
      tags: [admin]
      summary: coach_quality_flags canary rows, joined with coach + club context
      description: >
        Paginated list of `coach_quality_flags` rows, joined to the parent
        `coach_discoveries` (surfacing `coach_name`, `coach_email`,
        `club_name_raw`), the snapshot's `canonical_clubs` resolution (for
        a `club_display_name` when the discovery's `club_id` is set), and
        `admin_users` (for `resolved_by_email`). Callers never see raw
        jsonb — any typed metadata extraction happens at the API boundary
        on a per-flag-type basis (today the whole jsonb payload is returned
        verbatim in `metadata` as a `record<unknown>`; a future PR can
        promote per-flag fields into typed columns once the pollution
        investigation has settled on a stable contract).

        Phase 3 scope: the table is populated by PR 1 (shared guard +
        scraper wiring) and PR 2 (purge script audit rows) of the 3-PR
        coach-pollution remediation. This endpoint returns an empty list
        at PR-3 merge time by design.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: flag_type
          in: query
          description: Optional filter by flag_type. Matches the CHECK list verbatim.
          schema:
            type: string
            enum:
              - looks_like_name_reject
              - role_label_as_name
              - corrupt_email
              - nav_leaked
        - name: resolved
          in: query
          description: >
            If true, return only resolved flags; if false, return only
            active (unresolved) flags; if omitted, return both.
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of coach-quality-flag rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachQualityFlagsResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/data-quality/coach-quality-flags/{id}/resolve:
    patch:
      operationId: resolveCoachQualityFlag
      tags: [admin]
      summary: Mark a coach_quality_flags row as resolved
      description: >
        Stamps `resolved_at = NOW()` and `resolved_by = <admin user id>`
        on the row. The underlying `coach_discoveries` row is NOT mutated
        — resolving a flag means "operator has triaged this canary", not
