        - pageSize
        - windowDays

    NavLeakedNamesRow:
      type: object
      description: >
        One `roster_quality_flags` row joined to its
        `club_roster_snapshots` parent (and the snapshot's
        `canonical_clubs` resolution if the linker has run).
        `leakedStrings` and `snapshotRosterSize` are extracted from the
        jsonb `metadata` payload into typed columns at the API boundary —
        callers do not see raw jsonb. `clubId` / `clubNameCanonical` are
        nullable because the canonical-club linker may not have run yet.
        `resolvedByEmail` is joined from `admin_users` when the flag has
        been resolved.
      properties:
        id:
          type: integer
        snapshotId:
          type: integer
        clubId:
          type: integer
          nullable: true
        clubNameCanonical:
          type: string
          nullable: true
        leakedStrings:
          type: array
          items:
            type: string
        snapshotRosterSize:
          type: integer
        flaggedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        resolvedByEmail:
          type: string
          nullable: true
      required:
        - id
        - snapshotId
        - clubId
        - clubNameCanonical
        - leakedStrings
        - snapshotRosterSize
        - flaggedAt
        - resolvedAt
        - resolvedByEmail

    NavLeakedNamesResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/NavLeakedNamesRow"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - rows
        - total
        - page
        - pageSize

    CoachQualityFlag:
      type: object
      description: >
        One `coach_quality_flags` row joined to its `coach_discoveries`
        parent (surfacing `coachName`, `coachEmail`, `clubNameRaw`) plus
        the discovery's `canonical_clubs` resolution (`clubDisplayName`,
        nullable — depends on whether the discovery has a `club_id`). The
        raw jsonb `metadata` payload is returned verbatim; the per-flag-
        type contract lives in the schema-file docstring and will migrate
        to typed columns once the pollution investigation settles on a
        stable shape. `resolvedByEmail` is joined from `admin_users.email`
        when the flag has been resolved.
      properties:
        id:
          type: integer
        discoveryId:
          type: integer
        flagType:
          type: string
          enum:
            - looks_like_name_reject
            - role_label_as_name
            - corrupt_email
            - nav_leaked
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        flaggedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        resolvedByEmail:
          type: string
          nullable: true
        resolutionNote:
          type: string
          nullable: true
        coachName:
          type: string
        coachEmail:
          type: string
          nullable: true
        clubNameRaw:
          type: string
          nullable: true
        clubId:
          type: integer
          nullable: true
        clubDisplayName:
          type: string
          nullable: true
      required:
        - id
        - discoveryId
        - flagType
        - metadata
        - flaggedAt
        - resolvedAt
        - resolvedByEmail
        - resolutionNote
        - coachName
        - coachEmail
        - clubNameRaw
        - clubId
        - clubDisplayName

    CoachQualityFlagsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CoachQualityFlag"
        total:
