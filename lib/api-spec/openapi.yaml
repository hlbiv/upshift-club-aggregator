          type: integer
          description: Lower-id member of the pair (normalized so club_a_id < club_b_id)
        club_b_id:
          type: integer
          description: Higher-id member of the pair
        club_a_name:
          type: string
        club_b_name:
          type: string
        review:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/DuplicateReview"
      required:
        - normalized_name
        - club_count
        - club_ids
        - club_names
        - sources
        - club_a_id
        - club_b_id
        - club_a_name
        - club_b_name

