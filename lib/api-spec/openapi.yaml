    # =======================================================================
    # Admin-surface schemas.
    #
    # Mirrored from the hand-written source of truth at
    # `lib/api-zod/src/admin/schemas.ts`. Field names are camelCase because
    # that's what the admin routes return today; the public-API schemas
    # above are snake_case for historical reasons. Do not try to normalize
    # the two — they're independently consumed.
    # =======================================================================

    AdminLoginRequest:
