      summary: Resolve a college quality flag by providing the corrected soccer_program_url
      description: >
        Accepts `{ new_soccer_program_url: string }`. In a single transaction:
          1. Validates the flag exists and is unresolved.
          2. Updates `colleges.soccer_program_url` for the flag's `college_id`.
          3. Marks the flag resolved with `resolution_note = 'url_provided'`.

        Returns 400 if the URL is missing/invalid or the flag is already
        resolved, 404 if the flag id is unknown.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveCollegeRosterQualityFlagWithUrlRequest"
      responses:
        "200":
          description: URL written and flag resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveCollegeRosterQualityFlagWithUrlResponse"
        "400":
          description: Invalid id, invalid/missing URL, or flag already resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No college_roster_quality_flags row with that id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/pro-academies:
    get:
      operationId: getProAcademies
      tags: [admin]
      summary: List academy-family-affiliated clubs with their pro-academy flag
      description: >
        Returns every `canonical_clubs` row that has at least one
        affiliation in a tier-1 academy family (MLS NEXT / NWSL Academy /
        USL Academy), surfaced with the current `is_pro_academy` flag and
        the rolled-up `competitive_tier`. This is the operator-facing view
        of the curated allow-list previously edited by hand in
        `scripts/src/seed-pro-academies.ts` — flipping the flag here
        persists to the DB and re-runs the per-club tier rollup, so
        operators no longer need a code change + redeploy to add or
        remove a pro academy.

        `families` is the deduplicated set of academy families the club
        plays in at tier 1 — usually a single family, but multi-affiliated
        clubs (e.g. boys MLS NEXT + girls NWSL Academy) surface both.

        Optional `flag` filter: `all` (default) returns every academy-
        family club; `flagged` keeps only currently-flagged pro academies;
        `unflagged` keeps only the borderline candidates that play in an
        academy-family league but are NOT on the allow-list — the work
        queue for reconciling the ~205 candidates the rollup surfaces.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: flag
          in: query
          schema:
            type: string
            enum: [all, flagged, unflagged]
            default: all
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Paginated list of academy-family clubs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProAcademiesResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/pro-academies/{clubId}:
    patch:
      operationId: updateProAcademy
      tags: [admin]
      summary: Toggle a club's is_pro_academy flag and re-run its tier rollup
      description: >
        Sets `canonical_clubs.is_pro_academy` to the supplied boolean for
        one club, then recomputes that club's `competitive_tier` using the
        same rollup decision rule as
        `scripts/src/backfill-competitive-tier.ts` (top-tier-numeric MIN
        across the club's mapped affiliations, with the academy override
        gated on the new flag value AND a tier-1 academy-family
        affiliation). Returns the post-update flag + tier so the dashboard
        can patch its row in place without an extra fetch.

        Both writes happen in a single transaction so the flag and the
        rollup never disagree. A no-op flip (current value already
        matches the requested value) still re-runs the rollup — keeps the
        contract idempotent and lets operators force a recompute after
        upstream affiliation changes.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProAcademyRequest"
      responses:
        "200":
          description: Updated row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProAcademyResponse"
        "400":
          description: Invalid id or body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No canonical_clubs row with that id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/growth/scraped-counts:
    get:
      operationId: getGrowthScrapedCounts
      tags: [admin]
      summary: Records-added-since-X delta across five headline ingest tables
      description: >
        Per-table `count(*) WHERE <timestamp_col> > since`. Timestamp column
        differs per table — `canonical_clubs.last_scraped_at`,
        `coaches.first_seen_at`, `events.last_scraped_at`,
        `club_roster_snapshots.snapshot_date`, `matches.scraped_at`.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: since
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: ISO-8601 lower bound
      responses:
        "200":
          description: Per-table deltas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapedCountsDelta"
        "400":
          description: Missing or invalid `since`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/growth/coverage-trend:
    get:
      operationId: getGrowthCoverageTrend
      tags: [admin]
      summary: Daily scrape-run telemetry points over a rolling window
      description: >
        Aggregates `scrape_run_logs` by day for the last `days` days.
        `successes` counts `status='ok'`; `failures` counts
        `status IN ('partial','failed')`. `running` rows contribute to `runs`
        but not to successes/failures.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
          description: Size of the rolling window in days
      responses:
        "200":
          description: Daily trend points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageTrendResponse"
        "400":
          description: Invalid `days`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scraper-schedules:
    get:
      operationId: listScraperSchedules
      tags: [admin]
      summary: List all known scraper schedules with metadata + recent runs
      description: >
        Returns every jobKey in the server-side allow-list plus its curated
        `description`, `cronExpression` (null for Run-Now-only jobs), and
        the last N `scheduler_jobs` rows. Adding a new allow-listed jobKey
        to the server causes it to appear here automatically — the dashboard
        renders dynamically from this payload.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: limit
          in: query
          description: Recent runs per schedule (default 10, max 100).
          schema:
            type: integer
            default: 10
            maximum: 100
      responses:
        "200":
          description: All known schedules with their recent runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScraperSchedulesResponse"
        "400":
          description: Invalid limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scraper-schedules/{jobKey}/runs:
    get:
      operationId: listScraperScheduleRuns
      tags: [admin]
      summary: List recent scheduler-job rows for a given jobKey
      description: >
        Newest-first by `requested_at`. Default `limit` 20, max 100.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: jobKey
          in: path
          required: true
          schema:
            type: string
            enum: [nightly_tier1, weekly_state, hourly_linker]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Job rows for this jobKey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerJobList"
        "400":
          description: Unknown jobKey or invalid limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scraper-schedules/{jobKey}/run:
    post:
      operationId: runScraperScheduleNow
      tags: [admin]
      summary: Enqueue a one-off run of an allow-listed scheduler jobKey
      description: >
        Inserts a `scheduler_jobs` row at `status=pending`; the in-process
        worker picks it up on its next tick. Guarded by `requireSuperAdmin`
        (session-only) plus the 30/min mutation rate limiter. Body `args`
        are forwarded as CLI flags by the worker.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: jobKey
          in: path
          required: true
          schema:
            type: string
            enum: [nightly_tier1, weekly_state, hourly_linker]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunNowRequest"
      responses:
        "201":
          description: Enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunNowResponse"
        "400":
          description: Unknown jobKey or invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not a super_admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/coverage/leagues:
    get:
      operationId: getCoverageLeagues
      tags: [admin]
      summary: Per-league coverage rollup — clubs with rosters / coaches / staleness
      description: >
        Paginated rollup of every league in `leagues_master` alongside
        aggregate counts of its affiliated canonical clubs. `clubsTotal`
        counts clubs reachable via `club_affiliations` (join:
        `leagues_master.id` = `club_affiliations.league_id` — a stable
        id, so a `leagues_master.league_name` rename can't drop the
        league out of the rollup).

        Subset counts:
          * `clubsWithRosterSnapshot` — clubs with >=1 row in
            `club_roster_snapshots.club_id`.
          * `clubsWithCoachDiscovery` — clubs with >=1 row in
            `coach_discoveries.club_id`.
          * `clubsNeverScraped` — clubs with no `scrape_health` row for
            `entity_type='club'` / `entity_id=club.id`.
          * `clubsStale14d` — clubs with `scrape_health.last_scraped_at <
            now() - 14 days`.

        Ordered `clubs_never_scraped DESC, clubs_stale_14d DESC,
        league_name ASC` so worst-covered leagues surface on page 1.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated per-league coverage rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageLeaguesResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/coverage/leagues/summary:
    get:
      operationId: getCoverageLeaguesSummary
      tags: [admin]
      summary: Aggregate coverage totals across every league
      description: >
        Returns global rollups across every league in `leagues_master`,
        deduplicated by canonical club so a club affiliated with N
        leagues counts once. Used by the Coverage page's KpiStrip so
        operators can see "X of Y clubs have a roster snapshot" without
        paginating through the per-league table.

        Counts:
          * `leaguesTotal` — every row in `leagues_master`.
          * `clubsTotal` — distinct `canonical_clubs.id` reachable via
            any `club_affiliations` row.
          * `clubsWithRosterSnapshot` — distinct affiliated clubs with
            at least one `club_roster_snapshots` row.
          * `clubsWithCoachDiscovery` — distinct affiliated clubs with
            at least one `coach_discoveries` row.
          * `clubsNeverScraped` — distinct affiliated clubs with no
            `scrape_health` row (`entity_type='club'`) or NULL
            `last_scraped_at`.
          * `clubsStale14d` — distinct affiliated clubs with
            `scrape_health.last_scraped_at < now() - 14 days`.
      security:
        - sessionAuth: []
        - apiKey: []
      responses:
        "200":
          description: Aggregate coverage rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageLeaguesSummaryResponse"

  /v1/admin/coverage/leagues/history:
    get:
      operationId: getCoverageLeaguesHistory
      tags: [admin]
      summary: Daily snapshot timeseries of the global coverage rollup
      description: >
        Daily timeseries of the same six counters returned by
        `/v1/admin/coverage/leagues/summary`. One row per UTC day, oldest
        first, capped at `days` rows (default 30, max 365). Powers the
        sparkline + delta badges on the Coverage page's KpiStrip so
        operators can spot week-over-week regressions at a glance.

        History is recorded by an idempotent upsert inside the summary
        endpoint: each call rewrites today's row with the latest counters
        (`ON CONFLICT (snapshot_date) DO UPDATE`). On a fresh deploy the
        series starts the first day the summary endpoint is called.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Daily snapshot timeseries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageLeaguesHistoryResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/coverage/leagues/{leagueId}/history:
    get:
      operationId: getCoverageLeagueHistory
      tags: [admin]
      summary: Daily snapshot timeseries for a single league
      description: >
        Daily timeseries of one league's coverage rollup. Same five
        per-league counters returned by `/v1/admin/coverage/leagues`
        (no `leaguesTotal` — that's a global field). One row per UTC day,
        oldest first, capped at `days` rows (default 30, max 365). Powers
        the sparkline + week-over-week delta on the Coverage drilldown
        page so operators can see whether a specific league's coverage is
        improving or regressing.

        History is recorded by the same idempotent upsert that powers the
        global timeseries: each call to `/v1/admin/coverage/leagues/summary`
        bulk-rewrites today's row for every league
        (`ON CONFLICT (snapshot_date, league_id) DO UPDATE`).

        Returns 404 if `leagueId` is unknown to `leagues_master`.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: leagueId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
        - name: days
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Daily snapshot timeseries for one league
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageLeagueHistoryResponse"
        "400":
          description: Invalid path / query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/coverage/leagues/{leagueId}:
    get:
      operationId: getCoverageLeagueDetail
      tags: [admin]
      summary: Per-club coverage drilldown inside one league
      description: >
        Paginated list of the canonical clubs affiliated with the given
        league, each row carrying its last-scraped timestamp, consecutive
        failures, coach count, roster-snapshot presence, staff-page URL,
        and scrape confidence.

        `status` filters:
          * `all` (default) — every affiliated club.
          * `never_scraped` — clubs whose `scrape_health.last_scraped_at`
            is NULL or have no `scrape_health` row at all.
          * `stale` — clubs with `scrape_health.last_scraped_at < now() -
            14 days`.

        Ordered `last_scraped_at ASC NULLS FIRST, club_name_canonical ASC`
        so oldest + never-scraped clubs bubble up. Returns 404 if
        `leagueId` is unknown.
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: leagueId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [all, never_scraped, stale]
            default: all
      responses:
        "200":
          description: Paginated per-club coverage drilldown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageLeagueDetailResponse"
        "400":
          description: Invalid path / query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/scheduler-jobs/{id}:
    get:
      operationId: getSchedulerJob
      tags: [admin]
      summary: Get a single scheduler_jobs row by id
      security:
        - sessionAuth: []
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: One SchedulerJob row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerJob"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        Machine-to-machine authentication. Mint a key with
        `scripts/src/create-api-key.ts` on Replit and send the plaintext in
        this header on every request. Server also accepts
        `Authorization: Bearer <key>` as an alternative. Gated by the
        `API_KEY_AUTH_ENABLED` env var; when unset, auth is skipped
        entirely (bootstrap mode). `/healthz` is exempt.
    sessionAuth:
      type: apiKey
      in: cookie
      name: upshift_admin_sid
      description: >
        Human admin session cookie (httpOnly, sameSite=lax), set by
        `POST /v1/admin/auth/login`. TTL is enforced server-side via
        `admin_sessions.expires_at`. Logout (`POST /v1/admin/auth/logout`)
        clears the cookie. The same routes that accept `sessionAuth` also
        accept an M2M `apiKey` header — either is sufficient.
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Club:
      type: object
      properties:
        id:
          type: integer
        club_name_canonical:
          type: string
        club_slug:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        status:
          type: string
        website:
          type: string
          nullable: true
        website_status:
          type: string
          nullable: true
      required:
        - id
        - club_name_canonical
        - club_slug
        - city
        - state
        - country
        - status

    Alias:
      type: object
      properties:
        id:
          type: integer
        alias_name:
          type: string
        alias_slug:
          type: string
        source:
          type: string
        is_official:
          type: boolean
      required:
        - id
        - alias_name
        - alias_slug
        - source
        - is_official

    Affiliation:
      type: object
      properties:
        id:
          type: integer
        gender_program:
          type: string
        platform_name:
          type: string
        platform_tier:
          type: string
        conference_name:
          type: string
        division_name:
          type: string
        season:
          type: string
        source_url:
          type: string
        source_name:
          type: string
        verification_status:
          type: string
        notes:
          type: string
      required:
        - id
        - gender_program
        - platform_name
        - platform_tier
        - conference_name
        - division_name
        - season
        - source_url
        - source_name
        - verification_status
        - notes

    League:
      type: object
      properties:
        id:
          type: integer
        league_name:
          type: string
        league_family:
          type: string
        governing_body:
          type: string
        tier_numeric:
          type: integer
        tier_label:
          type: string
        gender:
          type: string
        geographic_scope:
          type: string
        has_public_clubs:
          type: boolean
        scrape_priority:
          type: string
        source_type:
          type: string
        official_url:
          type: string
        notes:
          type: string
      required:
        - id
        - league_name
        - league_family
        - governing_body
        - tier_numeric
        - tier_label
        - gender
        - geographic_scope
        - has_public_clubs
        - scrape_priority
        - source_type
        - official_url
        - notes

    ClubListResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - clubs
        - total
        - page
        - page_size

    ClubDetailResponse:
      allOf:
        - $ref: "#/components/schemas/Club"
        - type: object
          properties:
            aliases:
              type: array
              items:
                $ref: "#/components/schemas/Alias"
            affiliations:
              type: array
              items:
                $ref: "#/components/schemas/Affiliation"
          required:
            - aliases
            - affiliations

    ClubRelatedResponse:
      type: object
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
      required:
        - clubs

    SearchResponse:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/Club"
      required:
        - query
        - results

    College:
      type: object
      description: A canonical college / university record.
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        division:
          type: string
        conference:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        gender_program:
          type: string
      required:
        - id
        - name
        - slug
        - division
        - gender_program

    CollegeListResponse:
      type: object
      properties:
        colleges:
          type: array
          items:
            $ref: "#/components/schemas/College"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
      required:
        - colleges
        - total
        - page
        - page_size

    LeagueListResponse:
      type: object
      properties:
        leagues:
          type: array
          items:
            $ref: "#/components/schemas/League"
      required:
        - leagues

    LeagueClubsResponse:
      type: object
      properties:
        league_id:
          type: integer
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"
      required:
