# RI, SC, SD, TN, UT, VA, VT, WA, WI, WV, WY, plus sub-state assocs
# (CA-North, NY-West, PA-West, South Texas, etc.) are all pending.
# No public URL has been verified for them at the time this PR
# shipped. DO NOT add speculative URLs here — they will 404 and
