# ODP (Olympic Development Program) state-association roster seed URLs.
#
# Each US state association publishes its ODP roster or player-pool list
# under a different URL shape — some USYS-hosted, some standalone. URLs
# below were confirmed manually (see PR description for the confirmation
# date). If a state is listed with an empty `urls: []`, no public roster
# URL could be verified — do NOT fabricate one; file a follow-up and
# ship the state separately once an operator supplies a URL.
#
# The `parser` key maps to a function in scraper/extractors/odp_rosters.py
# (registry dict `PARSERS`). Shared parsers are reused across states
# with similar DOM shape; when in doubt ship a per-state parser first
# and factor it up only after two or more states demonstrably share
# layout.
#
# --- wave-3b sweep (2026-04-19) ----------------------------------------
# Total states/sub-associations with public URLs: 15 (was 5).
# Deferred (no public URL surfaced or placeholder "coming soon"): 39.
# Last sweep: 2026-04-19.
#
# Deferred list: AL, AR, CO, CT, DE, GA, HI, IA, ID, IN, KS, KY, LA,
# MA, MD, ME, MI, MN, MS, MT, NC, ND, NE, NM, NV, OK, OR, PA-W, RI,
# SC, SD, TN, UT, VA, VT, WA, WI, WV, WY.
#
# Wave-3b's policy: when a state association explicitly says rosters
# are "coming soon" or only mentions them behind an email contact, we
# leave `urls: []` with a note. Many of these states DO publish pools
# eventually (usually USYS-hosted) but the URL isn't discoverable from
# a public nav; operator needs to supply once the cycle publishes.
#
# Phase 2 (separate follow-up): register parsers to existing extractors
# for the USYS-hosted layouts (Ohio, NY-West, STX, Missouri, EPYSA-G,
# CalNorth PDF) — shapes that clearly share structure.

