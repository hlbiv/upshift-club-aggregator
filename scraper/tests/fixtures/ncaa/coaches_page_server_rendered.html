<!DOCTYPE html>
<!--
  Fixture for the PR-9 coaches-page fallback. Represents a
  server-rendered ``/coaches`` page returned by an athletics CMS
  whose roster page itself is JS-rendered (Pepperdine, George
  Mason, Virginia Tech all match this shape — the roster is
  hydrated client-side but the staff page ships static HTML).

  Markup follows the legacy SIDEARM ``.sidearm-staff-member``
  shape — the dominant pattern on dedicated /coaches pages even
  on tenants whose roster pages have moved to the modern
  ``.s-person-card`` grid. Includes both an Associate Head Coach
  and a Head Coach card so the test verifies the strict-coach
  guard correctly returns the Head, not the Associate.
-->
