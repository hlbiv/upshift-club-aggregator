<!DOCTYPE html>
<!--
  Fixture for the WMT/Vue-style staff card layout used on the
  Stanford men's soccer roster (`.roster-staff-members-card-item`).
  The position carries the head-coach signal (sometimes phrased as
  a named directorship like "Director of Men's Soccer"); the name
  is in `.roster-card-item__title`.

  Captured structurally from gostanford.com — names sanitized,
  decorative wrappers and SVG omitted.
-->
<html lang="en">
<head><title>Men's Soccer Roster - Test U</title></head>
<body>

<div class="roster-staff-members">
  <div class="roster-staff-members__block">
    <div class="roster-staff-members-cards">

      <div class="roster-card-item roster-staff-members-card-item">
        <div class="roster-card-item__inner">
          <a class="roster-card-item__image-wrapper"
             href="/sports/mens-soccer/roster/staff/jeremy-gunn">
            <img alt="Jeremy Gunn" class="roster-card-item__image"
                 src="data:image/gif;base64,R0lGODlhAQABAAAAACw="/>
          </a>
          <div class="roster-card-item__body">
            <div class="roster-card-item__content">
              <strong class="roster-card-item__position">Head Coach</strong>
              <a class="roster-card-item__title roster-card-item__title--link"
                 href="/sports/mens-soccer/roster/staff/jeremy-gunn">Jeremy Gunn</a>
            </div>
          </div>
        </div>
      </div>

      <div class="roster-card-item roster-staff-members-card-item">
        <div class="roster-card-item__inner">
          <a class="roster-card-item__image-wrapper"
             href="/sports/mens-soccer/roster/staff/drew-hutchins">
            <img alt="Drew Hutchins" class="roster-card-item__image"
                 src="data:image/gif;base64,R0lGODlhAQABAAAAACw="/>
          </a>
          <div class="roster-card-item__body">
            <div class="roster-card-item__content">
              <strong class="roster-card-item__position">Associate Head Coach</strong>
              <a class="roster-card-item__title roster-card-item__title--link"
                 href="/sports/mens-soccer/roster/staff/drew-hutchins">Drew Hutchins</a>
            </div>
          </div>
        </div>
      </div>

      <div class="roster-card-item roster-staff-members-card-item">
        <div class="roster-card-item__inner">
          <a class="roster-card-item__image-wrapper"
             href="/sports/mens-soccer/roster/staff/woo-jeon">
            <img alt="Woo Jeon" class="roster-card-item__image"
                 src="data:image/gif;base64,R0lGODlhAQABAAAAACw="/>
          </a>
          <div class="roster-card-item__body">
            <div class="roster-card-item__content">
              <strong class="roster-card-item__position">Assistant Coach</strong>
              <a class="roster-card-item__title roster-card-item__title--link"
                 href="/sports/mens-soccer/roster/staff/woo-jeon">Woo Jeon</a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
