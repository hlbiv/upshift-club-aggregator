name: typescript

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - name: Build @hlbiv/api-zod (dist/ needed for consumers)
        run: pnpm --filter @hlbiv/api-zod run build
      - name: Typecheck workspace
        run: pnpm typecheck
      - name: api-server tests
        env:
          DATABASE_URL: postgres://unused@localhost/test
        run: pnpm --filter @workspace/api-server run test
      - name: dashboard tests
        run: pnpm --filter @workspace/dashboard run test
      - name: Scripts tests
        env:
          DATABASE_URL: postgres://unused@localhost/test
        run: pnpm --filter @workspace/scripts run test:create-admin-user && pnpm --filter @workspace/scripts run test:api-key
